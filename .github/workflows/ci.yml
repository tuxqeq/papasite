name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      other: ${{ steps.filter.outputs.other }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            other:
              - '**'
              - '!frontend/**'
              - '!backend/**'

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.other == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test ./...
        working-directory: backend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.other == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.other == 'true') &&
      needs.test-backend.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -o server .
        working-directory: backend

      - name: Copy binary to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/server
          target: /home/ubuntu/bireca-api/
          strip_components: 1

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart bireca
            sleep 2
            sudo systemctl status bireca

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.other == 'true') &&
      needs.test-frontend.result == 'success'
    steps:
      - name: Trigger Vercel deployment
        run: curl -sf -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
